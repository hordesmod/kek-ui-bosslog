name: Hordes Tracker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Opt-in to Node 24 early to avoid future surprises
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6 # Latest Node 24 compatible

    - name: Restore SQLite Database
      id: cache-db-restore
      uses: actions/cache/restore@v5 # Latest Node 24 compatible
      with:
        path: cache/data.sqlite
        key: sqlite-v6-${{ github.run_id }}
        restore-keys: |
          sqlite-v6-

    - name: Setup Python
      uses: actions/setup-python@v6 # Latest Node 24 compatible
      with:
        python-version: '3.13'

    - name: Install Dependencies
      run: pip install requests

    - name: Run Scraper
      run: python main.py

    - name: Save Updated SQLite
      id: cache-db-save
      uses: actions/cache/save@v5 # Latest Node 24 compatible
      if: always()
      with:
        path: cache/data.sqlite
        key: sqlite-v6-${{ github.run_id }}

    - name: Push Data and Logs
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add data/ README.md
        if ! git diff --cached --quiet; then
          git commit -m "$(date +'%Y-%m-%d %H:%M') [skip ci]"
          git push
        fi
